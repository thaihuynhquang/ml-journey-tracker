<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Lộ trình Frontend → AI/ML Engineer + Google Pro ML Engineer cert. Tùy chỉnh lịch học, chi phí tiết kiệm, checkpoint PASS/FAIL và fallback path." />
    <meta name="theme-color" content="#6366f1" />
    <meta name="author" content="thaihuynhquang" />
    <meta property="og:title" content="ML Engineer Journey Tracker" />
    <meta property="og:description" content="Lộ trình 30 tuần Frontend → AI/ML Engineer với checkpoint, fallback path, và cost analysis." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://thaihuynhquang.github.io/ml-journey-tracker/" />
    <meta name="twitter:card" content="summary" />
    <title>ML Engineer Journey Tracker</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A7%A0%3C/text%3E%3C/svg%3E" />
  </head>
  <body>
    <header class="app-header">
      <div class="header-inner">
        <div class="brand">
          <div class="brand-icon">ML</div>
          <div>
            <h1 id="brand-title">ML Engineer Journey</h1>
            <p id="brand-subtitle" class="muted">Frontend → AI/ML Engineer</p>
          </div>
        </div>
        <div class="header-actions">
          <div class="today-badge" id="today-badge"></div>
          <button class="btn-icon" id="theme-toggle" title="Toggle theme">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
          </button>
          <button class="btn-icon" id="export-btn" title="Export progress">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          </button>
          <label class="btn-icon" title="Import progress">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            <input type="file" id="import-input" accept="application/json" hidden />
          </label>
          <button class="btn-icon danger" id="reset-btn" title="Reset progress">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path></svg>
          </button>
        </div>
      </div>
      <nav class="tabs" id="tabs">
        <button class="tab active" data-tab="dashboard">Dashboard</button>
        <button class="tab" data-tab="phases">Phases</button>
        <button class="tab" data-tab="job">Job Hunt</button>
        <button class="tab" data-tab="costs">Chi phí</button>
        <button class="tab" data-tab="resources">Resources</button>
        <button class="tab" data-tab="risks">Rủi ro</button>
        <button class="tab" data-tab="routine">Routine</button>
      </nav>
    </header>

    <main class="container">
      <ml-view-dashboard id="view-dashboard" class="view active"></ml-view-dashboard>
      <ml-view-phases id="view-phases" class="view"></ml-view-phases>
      <ml-view-job id="view-job" class="view"></ml-view-job>
      <ml-view-costs id="view-costs" class="view"></ml-view-costs>
      <ml-view-resources id="view-resources" class="view"></ml-view-resources>
      <ml-view-risks id="view-risks" class="view"></ml-view-risks>
      <ml-view-routine id="view-routine" class="view"></ml-view-routine>
    </main>

    <div class="toast" id="toast"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
